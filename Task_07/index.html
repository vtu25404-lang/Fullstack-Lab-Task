<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Feedback Form</h2>

<form id="feedbackForm">

    <label>Name:</label>
    <input type="text" id="name" onkeyup="validateName()">
    <span id="nameError"></span>

    <label>Email:</label>
    <input type="text" id="email" onkeyup="validateEmail()">
    <span id="emailError"></span>

    <label>Feedback:</label>
    <textarea id="feedback" onkeyup="validateFeedback()"></textarea>
    <span id="feedbackError"></span>

    <button type="button" ondblclick="submitForm()">Submit</button>

</form>

<script src="script.js"></script>
</body>
</html>
